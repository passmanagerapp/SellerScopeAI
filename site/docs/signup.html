<!doctype html>
<html lang="en" class="silk-colors_light">
 <head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <title>SellerScope | Order Management Dashboard</title>
  <meta content="SellerScope — The powerful order management dashboard for growing businesses" name="description">
  <link href="/favicon.ico" rel="icon">
  <meta content="width=device-width, initial-scale=1" name="viewport">
  <style>*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }
a { text-decoration: none; color: inherit; }

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeInLeft {
    from { opacity: 0; transform: translateX(-20px); }
    to   { opacity: 1; transform: translateX(0); }
}
@keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.6; }
}
@keyframes gradientShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
@keyframes float {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-8px); }
}</style>
  <style>@keyframes signupCardIn {
    from { opacity: 0; transform: translateY(28px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes signupBlobFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33%       { transform: translate(-20px, 15px) scale(1.04); }
    66%       { transform: translate(10px, -10px) scale(0.97); }
}
.signup-input {
    width: 100%;
    background: rgba(99,102,241,0.06);
    border: 1.5px solid rgba(99,102,241,0.22);
    border-radius: 10px;
    padding: 12px 16px;
    color: #e8e5ff;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    box-sizing: border-box;
}
.signup-input::placeholder { color: #8b84c4; }
.signup-input:focus {
    border-color: #6366f1;
    box-shadow: 0 0 0 3px rgba(99,102,241,0.18);
}
.signup-btn {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
}
.signup-btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
.signup-btn:active:not(:disabled) { transform: translateY(0); }
.signup-btn:disabled { opacity: 0.55; cursor: not-allowed; }
.signup-google-btn {
    width: 100%;
    padding: 12px;
    background: rgba(99,102,241,0.08);
    border: 1.5px solid rgba(99,102,241,0.22);
    border-radius: 10px;
    color: #e8e5ff;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}
.signup-google-btn:hover:not(:disabled) {
    background: rgba(99,102,241,0.16);
    border-color: rgba(99,102,241,0.4);
}
.signup-google-btn:disabled { opacity: 0.55; cursor: not-allowed; }
.signup-link {
    color: #6366f1;
    cursor: pointer;
    text-decoration: none;
}
.signup-link:hover { text-decoration: underline; }
.plan-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(16,185,129,0.12);
    border: 1px solid rgba(16,185,129,0.3);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 600;
    color: #10b981;
    margin-bottom: 20px;
}
.terms-text {
    font-size: 12px;
    color: #8b84c4;
    text-align: center;
    line-height: 1.6;
    margin-top: 16px;
}
.terms-text a { color: #6366f1; text-decoration: none; }
.terms-text a:hover { text-decoration: underline; }</style>
 </head>
